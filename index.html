<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masi!</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: url("island.jpg") no-repeat center center fixed;
  background-size: cover;
  font-family: "Segoe UI", Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;
}

/* Title */
h1 {
  margin-top: 40px;
  font-size: 60px;
  color: white;
  text-shadow: 3px 3px 15px rgba(0,0,0,0.6);
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* PHOTO WALL */
.photo-wall {
  max-width: 1100px;
  margin: 28px auto;
  display: grid;
  grid-template-columns: 1fr minmax(320px,420px) 1fr;
  gap: 24px;
  padding: 0 16px;
}

.panel {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 0 25px rgba(0,0,0,.45);
}

.panel.left, .panel.right {
  aspect-ratio: 3/4;
  min-height: 320px;
}
.panel.center {
  aspect-ratio: 4/5;
  min-height: 360px;
}

/* Slides */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}
.slide.active { opacity: 1; }
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONFETTI */
.confetti {
  width: 10px;
  height: 10px;
  position: absolute;
  animation: fall 5s infinite linear;
}
@keyframes fall {
  from { transform: translateY(-10vh) rotate(0deg); }
  to   { transform: translateY(110vh) rotate(360deg); }
}

/* HEART SPARK */
.spark {
  position: fixed;
  width: var(--size, 12px);
  height: var(--size, 12px);
  background: var(--c);
  transform: rotate(-45deg);
  pointer-events: none;
  filter: drop-shadow(0 0 12px var(--c));
}

.spark::before,
.spark::after {
  content: "";
  position: absolute;
  width: var(--size, 12px);
  height: var(--size, 12px);
  background: var(--c);
  border-radius: 50%;
}

.spark::before {
  top: calc(var(--size) * -0.5);
  left: 0;
}
.spark::after {
  top: 0;
  left: calc(var(--size) * 0.5);
}

/* Mobile */
@media (max-width: 780px) {
  .photo-wall { grid-template-columns: 1fr; }
  .panel.center { order: -1; }
}
</style>
</head>

<body>

<h1>🎉Love You Di PaithiyaKari 💚🥰🎉</h1>

<div class="photo-wall">
  <div class="panel left">
    <div class="slide active"><img src="left1.PNG"></div>
    <div class="slide"><img src="left2.PNG"></div>
    <div class="slide"><img src="left3.PNG"></div>
  </div>

  <div class="panel center">
    <div class="slide active"><img src="center1.PNG"></div>
    <div class="slide"><img src="center2.PNG"></div>
    <div class="slide"><img src="center3.PNG"></div>
    <div class="slide"><img src="center4.PNG"></div>
  </div>

  <div class="panel right">
    <div class="slide active"><img src="right1.PNG"></div>
    <div class="slide"><img src="right2.PNG"></div>
    <div class="slide"><img src="right3.PNG"></div>
  </div>
</div>

<script>
/* SLIDESHOW */
document.querySelectorAll(".panel").forEach((panel, i) => {
  const slides = panel.querySelectorAll(".slide");
  let index = 0;
  setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 2600 + i * 200);
});

/* CONFETTI */
for (let i = 0; i < 40; i++) {
  const c = document.createElement("div");
  c.className = "confetti";
  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor =
    ["red","blue","green","yellow","pink","purple"]
    [Math.floor(Math.random()*6)];
  c.style.animationDuration =
    3 + Math.random()*3 + "s";
  document.body.appendChild(c);
}

/* SEQUENTIAL FIREWORK COLORS */
const HEART_COLORS = [
  "#ff1744", // Red
  "#2196f3", // Blue
  "#2ecc71", // Green
  "#ffeb3b", // Yellow
  "#ff4081", // Pink
  "#9c27b0", // Purple
  "#00bcd4", // Cyan
  "#ff9800"  // Orange
];

let fireworkIndex = 0;
function nextFireworkColor() {
  const color = HEART_COLORS[fireworkIndex];
  fireworkIndex =
    (fireworkIndex + 1) % HEART_COLORS.length;
  return color;
}

/* HEART FIREWORK */
function heartFirework(x, y) {

  /* Remove previous sparks */
  document.querySelectorAll(".spark")
    .forEach(s => s.remove());

  const fireworkColor = nextFireworkColor();

  for (let layer = 1; layer <= 3; layer++) {
    const points = 28 + layer * 10;
    const size = 6 + layer * 2;

    for (let i = 0; i < points; i++) {
      const t = (i / points) * Math.PI * 2;
      const hx = 16 * Math.pow(Math.sin(t), 3);
      const hy = 13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.setProperty("--size", size + "px");
      spark.style.setProperty("--c", fireworkColor);
      spark.style.left = x + "px";
      spark.style.top = y + "px";
      document.body.appendChild(spark);

      spark.animate([
        { transform: "translate(0,0) scale(0.4) rotate(-45deg)", opacity: 1 },
        { transform: `translate(${hx*7}px, ${-hy*7}px) scale(1.3) rotate(-45deg)`, opacity: 0 }
      ], {
        duration: 1400,
        easing: "ease-out"
      });
    }
  }
}

/* AUTO FIREWORK */
setInterval(() => {
  heartFirework(
    Math.random() * window.innerWidth,
    Math.random() * window.innerHeight * 0.75
  );
}, 1000);
</script>

</body>
</html>
